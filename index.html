<!doctype html>  
<html lang="es" class="h-full">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Sweet Sky - Pavlovas</title>  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">  
  <script async src="//www.instagram.com/embed.js"></script>  
  <style>  
    body { font-family: 'Nunito', sans-serif; background: #faf6f0; color: #4a3f35; }  
    .playfair { font-family: 'Playfair Display', serif; }  
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(139,69,19,0.1); }  
    .media-container { aspect-ratio: 1/1; position: relative; overflow: hidden; border-radius: 16px; background: #f3ebe1; }  
    .media-item { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; cursor: pointer; }  
    .hidden-media { opacity: 0; pointer-events: none; }  
    .active-media { opacity: 1; pointer-events: auto; }  
    .modal-bg { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }  
    /* Ajuste visual para los contenedores de los Reels de Instagram */  
    .video-container iframe { width: 100% !important; border-radius: 16px !important; border: 1px solid rgba(128,0,32,0.1) !important; min-height: 440px !important; }  
  </style>  
</head>  
<body class="h-full relative">  
  <div id="app" class="min-h-full">  
      
    <div class="absolute top-4 right-4 z-50 flex items-center gap-2">  
      <a href="https://www.instagram.com/sweetsky_sc?igsh=MXI2bDhsdWY4cTRodg%3D%3D&utm_source=qr" target="_blank" class="p-2 bg-[#800020]/10 text-[#800020] rounded-full hover:bg-[#800020]/20 transition-all flex items-center justify-center shadow-sm" title="Síguenos en Instagram">  
        <i data-lucide="instagram" class="w-5 h-5"></i>  
      </a>  
      <button onclick="openClientForm()" class="px-4 py-2 bg-[#800020] text-white text-xs sm:text-sm rounded-full font-bold hover:scale-105 transition-transform flex items-center gap-1.5 shadow-md shadow-[#800020]/20">  
        <i data-lucide="user-plus" class="w-4 h-4"></i> Registrar mis Datos 📝  
      </button>  
    </div>  
      
    <header class="py-12 px-4 text-center border-b border-[#800020]/10" style="background: linear-gradient(135deg, #fdfbf7 0%, #f5ebe0 100%);">  
      <div class="max-w-4xl mx-auto flex flex-col items-center mt-6">  
        <div class="w-32 h-32 mb-4 rounded-full bg-white shadow-md flex items-center justify-center overflow-hidden border border-[#800020]/10">  
          <img src="IMG_9428.PNG" alt="Sweet Sky Logo" class="w-full h-full object-cover">  
        </div>  
        <h1 class="text-4xl md:text-5xl font-bold playfair text-[#800020]">Sweet Sky</h1>  
        <p class="mt-2 text-amber-900/70 text-lg italic">Un pedacito de cielo en cada bocado ✨ Pavlovas Delicadas</p>  
          
        <a href="https://www.instagram.com/sweetsky_sc?igsh=MXI2bDhsdWY4cTRodg%3D%3D&utm_source=qr" target="_blank" class="mt-4 inline-flex items-center gap-1.5 text-xs font-bold uppercase tracking-wider text-[#800020] hover:underline bg-white px-4 py-1.5 rounded-full border border-[#800020]/10 shadow-sm transition-all">  
          <i data-lucide="instagram" class="w-4 h-4 text-[#800020]"></i> @sweetsky_sc  
        </a>  
      </div>  
    </header>  
  
    <nav class="sticky top-0 z-40 flex flex-wrap justify-center gap-3 py-4 px-4 bg-[#faf6f0]/95 backdrop-blur shadow-sm border-b border-amber-900/5">  
      <button onclick="filterProducts('all')" class="px-5 py-1.5 rounded-full border border-[#800020]/20 text-[#800020] hover:bg-[#800020] hover:text-white transition-all font-medium">Todas</button>  
      <button onclick="filterProducts('Postre Dulce')" class="px-5 py-1.5 rounded-full border border-[#800020]/20 text-[#800020] hover:bg-[#800020] hover:text-white transition-all font-medium">🍓 Postre Dulce</button>  
      <button onclick="filterProducts('Postre Acido')" class="px-5 py-1.5 rounded-full border border-[#800020]/20 text-[#800020] hover:bg-[#800020] hover:text-white transition-all font-medium">🫐 Postre Ácido</button>  
    </nav>  
  
    <main class="max-w-7xl mx-auto px-4 py-10">  
      <h2 class="text-2xl font-bold playfair text-[#800020] mb-6 border-b pb-2 flex items-center gap-2"><i data-lucide="cake"></i> Nuestro Menú Dinámico</h2>  
      <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">  
        </div>  
  
      <h2 class="text-2xl font-bold playfair text-[#800020] mt-16 mb-6 border-b pb-2 flex items-center gap-2"><i data-lucide="clapperboard"></i> Sweet Sky Clips</h2>  
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">  
          
        <div class="bg-white rounded-2xl p-4 border border-amber-950/5 shadow-sm video-container flex flex-col justify-between">  
          <div class="w-full overflow-hidden rounded-xl bg-gray-50 flex items-center justify-center">  
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DYVhOhti7qm/" data-instgrm-version="14" style="width:100%; margin:0; padding:0;"></blockquote>  
          </div>  
          <div class="mt-4">  
            <a href="https://www.instagram.com/reel/DYVhOhti7qm/" target="_blank" class="w-full py-2 rounded-xl bg-[#800020]/10 text-[#800020] text-xs font-bold hover:bg-[#800020]/20 flex items-center justify-center gap-1.5 transition-colors">  
              <i data-lucide="instagram" class="w-4 h-4"></i> Ver Reel en Instagram  
            </a>  
          </div>  
        </div>  
  
        <div class="bg-white rounded-2xl p-4 border border-amber-950/5 shadow-sm video-container flex flex-col justify-between">  
          <div class="w-full overflow-hidden rounded-xl bg-gray-50 flex items-center justify-center">  
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DYf9RApsJu8/" data-instgrm-version="14" style="width:100%; margin:0; padding:0;"></blockquote>  
          </div>  
          <div class="mt-4">  
            <a href="https://www.instagram.com/reel/DYf9RApsJu8/" target="_blank" class="w-full py-2 rounded-xl bg-[#800020]/10 text-[#800020] text-xs font-bold hover:bg-[#800020]/20 flex items-center justify-center gap-1.5 transition-colors">  
              <i data-lucide="instagram" class="w-4 h-4"></i> Ver Reel en Instagram  
            </a>  
          </div>  
        </div>  
  
        <div class="bg-white rounded-2xl p-4 border border-amber-950/5 shadow-sm video-container flex flex-col justify-between">  
          <div class="w-full overflow-hidden rounded-xl bg-gray-50 flex items-center justify-center">  
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DYxCifaxAEA/" data-instgrm-version="14" style="width:100%; margin:0; padding:0;"></blockquote>  
          </div>  
          <div class="mt-4">  
            <a href="https://www.instagram.com/reel/DYxCifaxAEA/" target="_blank" class="w-full py-2 rounded-xl bg-[#800020]/10 text-[#800020] text-xs font-bold hover:bg-[#800020]/20 flex items-center justify-center gap-1.5 transition-colors">  
              <i data-lucide="instagram" class="w-4 h-4"></i> Ver Reel en Instagram  
            </a>  
          </div>  
        </div>  
  
      </div>  
    </main>  
  
    <div id="client-modal" class="fixed inset-0 z-50 hidden modal-bg items-center justify-center p-4">  
      <div class="bg-white w-full max-w-md rounded-2xl p-8 border border-[#800020]/20 shadow-2xl relative text-gray-800">  
        <button onclick="closeClientForm()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i data-lucide="x"></i></button>  
        <h2 class="text-2xl font-bold playfair text-[#800020] mb-2 text-center">Registro de Clientes</h2>  
        <p class="text-xs text-gray-500 text-center mb-6">Guarda tus datos para agilizar tus próximos pedidos en Sweet Sky ☁️</p>  
          
        <form id="client-form" class="space-y-4 text-sm" onsubmit="handleClientSubmit(event)">  
          <div>  
            <label class="block text-gray-600 font-medium mb-1">Nombre Completo</label>  
            <input type="text" id="c-nombre" required class="w-full bg-[#faf6f0] border border-gray-200 rounded-lg px-4 py-2 focus:border-[#800020] outline-none" placeholder="Tu nombre">  
          </div>  
          <div>  
            <label class="block text-gray-600 font-medium mb-1">Número de Teléfono</label>  
            <input type="tel" id="c-telefono" required class="w-full bg-[#faf6f0] border border-gray-200 rounded-lg px-4 py-2 focus:border-[#800020] outline-none" placeholder="Ej. 0412-1234567">  
          </div>  
          <div>  
            <label class="block text-gray-600 font-medium mb-1">Dirección de Entrega (San Cristóbal)</label>  
            <textarea id="c-direccion" required class="w-full bg-[#faf6f0] border border-gray-200 rounded-lg px-4 py-2 h-20 focus:border-[#800020] outline-none" placeholder="Indica sector, calle, punto de referencia..."></textarea>  
          </div>  
          <button type="submit" id="btn-client-save" class="w-full py-3 bg-[#800020] text-white font-bold rounded-lg hover:opacity-90 transition-opacity mt-4 shadow-md shadow-[#800020]/10 flex items-center justify-center gap-2">  
            <i data-lucide="save" class="w-4 h-4"></i> Guardar mis Datos  
          </button>  
        </form>  
      </div>  
    </div>  
  
    <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/90 items-center justify-center p-4" onclick="closeLightbox()">  
      <div id="lightbox-content" class="max-w-4xl w-full flex items-center justify-center"></div>  
    </div>  
  </div>  
  
  <script>  
    const API_URL = 'https://sheetdb.io/api/v1/usveta0t3hyy9';  
    let allProducts = [];  
    const currentMediaIndex = {};  
  
    async function loadData() {  
      try {  
        const response = await fetch(API_URL);  
        allProducts = await response.json();  
          
        // CORRECCIÓN AUTOMÁTICA DE ORTOGRAFÍA EN DESCRIPCIÓN DE DURAZNOS  
        allProducts = allProducts.map(p => {  
          if (p.descripcion) {  
            p.descripcion = p.descripcion.replace(/deliciosas duraznos/g, "deliciosos duraznos");  
          }  
          return p;  
        });  
  
        renderProducts(allProducts);  
      } catch (e) { console.error("Error cargando el catálogo de Sweet Sky"); }  
    }  
  
    // ENVIAR MENSAJE A WHATSAPP  
    function enviarWhatsApp() {  
      const mensaje = "Hola Sweet Sky☁️, me gustaria ordenar una de sus pavlovas!. Mi nombre es…";  
      const url = `https://wa.me/584124205708?text=${encodeURIComponent(mensaje)}`;  
      window.open(url, '_blank');  
    }  
  
    function renderProducts(products) {  
      // Filtramos las filas que son productos válidos (tienen nombre y categoría)  
      const validProducts = products.filter(p => p.nombre && p.categoria);  
      const grid = document.getElementById('products-grid');  
        
      if (validProducts.length === 0) {  
        grid.innerHTML = `<p class="col-span-full text-center text-gray-400 py-10">No hay pavlovas registradas en esta clasificación.</p>`;  
        return;  
      }  
      grid.innerHTML = validProducts.map((p, index) => {  
        const media = [p.media1, p.media2, p.media3].filter(m => m && m.trim() !== "");  
        if(media.length === 0) media.push('https://images.unsplash.com/photo-1511018556340-d16986a1c194?w=500');   
          
        return `  
          <div class="bg-white rounded-2xl p-5 card-hover border border-amber-950/5 relative shadow-sm transition-all duration-300">  
            <div class="media-container group">  
              ${media.map((src, i) => renderMediaElement(src, i === 0, `media-${index}-${i}`, index)).join('')}  
              ${media.length > 1 ? `  
                <button onclick="event.stopPropagation(); changeMedia(${index}, -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/80 p-1.5 rounded-full text-[#4a3f35] opacity-0 group-hover:opacity-100 transition-opacity shadow"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>  
                <button onclick="event.stopPropagation(); changeMedia(${index}, 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/80 p-1.5 rounded-full text-[#4a3f35] opacity-0 group-hover:opacity-100 transition-opacity shadow"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>  
              ` : ''}  
            </div>  
            <div class="mt-4 flex flex-col justify-between h-36">  
              <div>  
                <div class="flex justify-between items-start">  
                  <h3 class="text-lg font-bold text-[#4a3f35] playfair">${p.nombre}</h3>  
                  <span class="text-[#800020] font-bold text-lg">$${p.precio}</span>  
                </div>  
                <p class="text-xs text-gray-500 mt-1 line-clamp-2">${p.descripcion || 'Base de merengue horneado crujiente, crema chantilly y frutas seleccionadas.'}</p>  
                <span class="inline-block bg-[#f5ebe0] text-[#800020] text-[10px] font-bold px-2.5 py-0.5 rounded-full mt-2">${p.categoria}</span>  
              </div>  
                
              <div class="mt-4">  
                <button onclick="enviarWhatsApp()" class="w-full py-2.5 rounded-xl bg-[#25D366] text-white text-xs font-bold hover:bg-[#20ba56] flex items-center justify-center gap-2 shadow-sm transition-colors">  
                  <i data-lucide="message-circle" class="w-4 h-4"></i> Ordenar por WhatsApp  
                </button>  
              </div>  
            </div>  
          </div>  
        `;  
      }).join('');  
      lucide.createIcons();  
    }  
  
    // CONTROLES DEL FORMULARIO DE CLIENTES  
    function openClientForm() {  
      document.getElementById('client-form').reset();  
      document.getElementById('client-modal').classList.replace('hidden', 'flex');  
    }  
  
    function closeClientForm() { document.getElementById('client-modal').classList.replace('flex', 'hidden'); }  
  
    // ENVÍO DE DATOS DEL CLIENTE A GOOGLE SHEETS  
    async function handleClientSubmit(e) {  
      e.preventDefault();  
      const btn = document.getElementById('btn-client-save');  
      btn.innerText = "Registrando...";  
      btn.disabled = true;  
  
      const clientData = {  
        nombre: document.getElementById('c-nombre').value,  
        telefono: document.getElementById('c-telefono').value,  
        direccion: document.getElementById('c-direccion').value  
      };  
  
      try {  
        await fetch(API_URL, {  
          method: 'POST',  
          headers: {'Content-Type': 'application/json'},  
          body: JSON.stringify({ data: [clientData] })  
        });  
        alert("¡Datos registrados con éxito! Gracias por preferir Sweet Sky ☁️");  
        closeClientForm();  
      } catch (e) {   
        alert("Error al conectar con la base de datos");   
      } finally {  
        btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> Guardar mis Datos`;  
        btn.disabled = false;  
        lucide.createIcons();  
      }  
    }  
  
    function renderMediaElement(src, isActive, id, productIndex) {  
      const cls = isActive ? 'media-item active-media' : 'media-item hidden-media';  
      return `<img id="${id}" src="${src}" class="${cls} rounded-xl" onclick="openLightbox('${src}')">`;  
    }  
  
    function changeMedia(idx, step) {  
      const items = document.querySelectorAll(`[id^="media-${idx}-"]`);  
      if(!currentMediaIndex[idx]) currentMediaIndex[idx] = 0;  
      items[currentMediaIndex[idx]].classList.replace('active-media', 'hidden-media');  
      currentMediaIndex[idx] = (currentMediaIndex[idx] + step + items.length) % items.length;  
      items[currentMediaIndex[idx]].classList.replace('hidden-media', 'active-media');  
    }  
  
    // FILTRO DE CATEGORÍAS  
    function filterProducts(cat) {  
      renderProducts(cat === 'all' ? allProducts : allProducts.filter(p => p.categoria && p.categoria.toLowerCase() === cat.toLowerCase()));  
    }  
  
    // LIGHTBOX FOTOS  
    function openLightbox(src) {  
      document.getElementById('lightbox-content').innerHTML = `<img src="${src}" class="max-h-[85vh] rounded-2xl shadow-2xl">`;  
      document.getElementById('lightbox').classList.replace('hidden', 'flex');  
    }  
  
    function closeLightbox() { document.getElementById('lightbox').classList.replace('flex', 'hidden'); }  
  
    window.onload = loadData;  
  </script>  
</body>  
</html>
