<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busca el tuyo, te lo tengo</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; background: #1a1a2e; color: #e0e0e0; }
    .playfair { font-family: 'Playfair Display', serif; }
    .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .media-container { aspect-ratio: 1/1; position: relative; overflow: hidden; border-radius: 12px; background: #0f3460; }
    .media-item { position: absolute; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; cursor: pointer; }
    .hidden-media { opacity: 0; pointer-events: none; }
    .active-media { opacity: 1; pointer-events: auto; }
    .modal-bg { background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="h-full">
  <div id="app" class="min-h-full">
    <header class="py-10 px-4 text-center border-b border-yellow-600/20" style="background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);">
      <h1 class="text-4xl md:text-5xl font-bold playfair text-[#e6b800]">Busca el tuyo, te lo tengo</h1>
      <p class="mt-3 text-gray-400 text-lg">Administración y Catálogo Dinámico</p>
      <button onclick="openForm()" class="mt-6 px-8 py-3 bg-[#e6b800] text-[#1a1a2e] rounded-full font-bold hover:scale-105 transition-transform flex items-center gap-2 mx-auto">
        <i data-lucide="plus-circle"></i> Añadir Producto
      </button>
    </header>

    <nav class="sticky top-0 z-40 flex flex-wrap justify-center gap-3 py-6 px-4 bg-[#1a1a2e]/95 backdrop-blur shadow-md border-b border-white/5">
      <button onclick="filterProducts('all')" class="px-5 py-2 rounded-full border border-yellow-600/30 hover:bg-[#e6b800] hover:text-[#1a1a2e] transition-all">Todos</button>
      <button onclick="filterProducts('bisuteria')" class="px-5 py-2 rounded-full border border-yellow-600/30 hover:bg-[#e6b800] hover:text-[#1a1a2e] transition-all">💍 Bisutería</button>
      <button onclick="filterProducts('colonias')" class="px-5 py-2 rounded-full border border-yellow-600/30 hover:bg-[#e6b800] hover:text-[#1a1a2e] transition-all">🧴 Colonias</button>
      <button onclick="filterProducts('relojes')" class="px-5 py-2 rounded-full border border-yellow-600/30 hover:bg-[#e6b800] hover:text-[#1a1a2e] transition-all">⌚ Relojes</button>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
      <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </main>

    <div id="form-modal" class="fixed inset-0 z-50 hidden modal-bg items-center justify-center p-4">
      <div class="bg-[#16213e] w-full max-w-lg rounded-2xl p-8 border border-[#e6b800]/30 shadow-2xl relative">
        <button onclick="closeForm()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
        <h2 id="modal-title" class="text-2xl font-bold playfair text-[#e6b800] mb-6">Nuevo Producto</h2>
        
        <form id="product-form" class="space-y-4 text-sm" onsubmit="handleFormSubmit(event)">
          <input type="hidden" id="edit-id"> <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
              <label class="block text-gray-400 mb-1">Nombre del Producto</label>
              <input type="text" id="f-nombre" required class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-4 py-2 focus:border-[#e6b800] outline-none">
            </div>
            <div>
              <label class="block text-gray-400 mb-1">Categoría</label>
              <select id="f-categoria" class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-4 py-2 outline-none">
                <option value="bisuteria">Bisutería</option>
                <option value="colonias">Colonias</option>
                <option value="relojes">Relojes</option>
              </select>
            </div>
            <div>
              <label class="block text-gray-400 mb-1">Precio (€)</label>
              <input type="number" step="0.01" id="f-precio" required class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-4 py-2 outline-none">
            </div>
            <div>
              <label class="block text-gray-400 mb-1">Stock</label>
              <input type="number" id="f-stock" required class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-4 py-2 outline-none">
            </div>
            <div class="col-span-2">
              <label class="block text-gray-400 mb-1">Descripción</label>
              <textarea id="f-desc" class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-4 py-2 h-20 outline-none"></textarea>
            </div>
            <div class="col-span-2 space-y-2">
              <label class="block text-gray-400 mb-1">URLs de Imágenes/Videos (Hasta 5)</label>
              <input type="text" id="f-m1" placeholder="URL Principal" class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-3 py-1 text-xs">
              <input type="text" id="f-m2" placeholder="URL 2" class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-3 py-1 text-xs">
              <input type="text" id="f-m3" placeholder="URL 3" class="w-full bg-[#1a1a2e] border border-white/10 rounded-lg px-3 py-1 text-xs">
            </div>
          </div>
          <button type="submit" id="btn-save" class="w-full py-3 bg-[#e6b800] text-[#1a1a2e] font-bold rounded-lg hover:opacity-90 transition-opacity">
            Guardar Cambios
          </button>
        </form>
      </div>
    </div>

    <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/95 items-center justify-center p-4" onclick="closeLightbox()">
      <div id="lightbox-content" class="max-w-4xl w-full flex items-center justify-center"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://sheetdb.io/api/v1/usveta0t3hyy9';
    let allProducts = [];
    const currentMediaIndex = {};

    async function loadData() {
      try {
        const response = await fetch(API_URL);
        allProducts = await response.json();
        renderProducts(allProducts);
      } catch (e) { console.error("Error cargando datos"); }
    }

    function renderProducts(products) {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = products.map((p, index) => {
        const media = [p.media1, p.media2, p.media3, p.media4, p.media5].filter(m => m && m.trim() !== "");
        return `
          <div class="bg-[#16213e] rounded-2xl p-4 card-hover border border-white/5 relative">
            <div class="media-container group">
              ${media.map((src, i) => renderMediaElement(src, i === 0, `media-${index}-${i}`, index)).join('')}
              ${media.length > 1 ? `
                <button onclick="event.stopPropagation(); changeMedia(${index}, -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 p-1 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="chevron-left"></i></button>
                <button onclick="event.stopPropagation(); changeMedia(${index}, 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 p-1 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="chevron-right"></i></button>
              ` : ''}
            </div>
            <div class="mt-4">
              <div class="flex justify-between items-start">
                <h3 class="text-xl font-bold text-white">${p.nombre}</h3>
                <span class="text-[#e6b800] font-bold text-lg">€${p.precio}</span>
              </div>
              <div class="flex gap-2 mt-4">
                <button onclick="editProduct('${p.nombre}')" class="flex-1 py-2 rounded-lg bg-gray-700 text-white text-xs font-bold hover:bg-gray-600 flex items-center justify-center gap-1"><i data-lucide="edit" class="w-3"></i> Editar</button>
                <button onclick="deleteProduct('${p.nombre}')" class="flex-1 py-2 rounded-lg bg-red-900/40 text-red-300 text-xs font-bold hover:bg-red-800 flex items-center justify-center gap-1"><i data-lucide="trash-2" class="w-3"></i> Eliminar</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    // Funciones CRUD
    function openForm(prod = null) {
      document.getElementById('product-form').reset();
      document.getElementById('edit-id').value = prod ? prod.nombre : "";
      document.getElementById('modal-title').innerText = prod ? "Editar Producto" : "Nuevo Producto";
      
      if(prod) {
        document.getElementById('f-nombre').value = prod.nombre;
        document.getElementById('f-categoria').value = prod.categoria;
        document.getElementById('f-precio').value = prod.precio;
        document.getElementById('f-stock').value = prod.stock;
        document.getElementById('f-desc').value = prod.descripcion;
        document.getElementById('f-m1').value = prod.media1 || "";
        document.getElementById('f-m2').value = prod.media2 || "";
        document.getElementById('f-m3').value = prod.media3 || "";
      }
      document.getElementById('form-modal').classList.replace('hidden', 'flex');
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-save');
      const editId = document.getElementById('edit-id').value;
      btn.innerText = "Procesando...";
      btn.disabled = true;

      const data = {
        nombre: document.getElementById('f-nombre').value,
        categoria: document.getElementById('f-categoria').value,
        precio: document.getElementById('f-precio').value,
        stock: document.getElementById('f-stock').value,
        descripcion: document.getElementById('f-desc').value,
        media1: document.getElementById('f-m1').value,
        media2: document.getElementById('f-m2').value,
        media3: document.getElementById('f-m3').value
      };

      try {
        if(editId) { // ACTUALIZAR
          await fetch(`${API_URL}/nombre/${editId}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ data: data })
          });
        } else { // CREAR
          await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ data: [data] })
          });
        }
        location.reload();
      } catch (e) { alert("Error al guardar"); }
    }

    async function deleteProduct(name) {
      if(!confirm(`¿Seguro que quieres eliminar "${name}"?`)) return;
      try {
        await fetch(`${API_URL}/nombre/${name}`, { method: 'DELETE' });
        location.reload();
      } catch (e) { alert("Error al eliminar"); }
    }

    function editProduct(name) {
      const p = allProducts.find(x => x.nombre === name);
      if(p) openForm(p);
    }

    function closeForm() { document.getElementById('form-modal').classList.replace('flex', 'hidden'); }

    // Auxiliares Multimedia (Igual que el anterior)
    function renderMediaElement(src, isActive, id, productIndex) {
      const isVideo = src.toLowerCase().match(/\.(mp4|webm|ogg)$/);
      const cls = isActive ? 'media-item active-media' : 'media-item hidden-media';
      return isVideo ? `<video id="${id}" src="${src}" class="${cls}" muted loop></video>` : `<img id="${id}" src="${src}" class="${cls}" onclick="openLightbox('${src}', false)">`;
    }

    function changeMedia(idx, step) {
      const items = document.querySelectorAll(`[id^="media-${idx}-"]`);
      if(!currentMediaIndex[idx]) currentMediaIndex[idx] = 0;
      items[currentMediaIndex[idx]].classList.replace('active-media', 'hidden-media');
      currentMediaIndex[idx] = (currentMediaIndex[idx] + step + items.length) % items.length;
      items[currentMediaIndex[idx]].classList.replace('hidden-media', 'active-media');
    }

    function filterProducts(cat) {
      renderProducts(cat === 'all' ? allProducts : allProducts.filter(p => p.categoria.toLowerCase() === cat.toLowerCase()));
    }

    function openLightbox(src, vid) {
      document.getElementById('lightbox-content').innerHTML = vid ? `<video src="${src}" controls autoplay class="max-h-screen"></video>` : `<img src="${src}" class="max-h-screen rounded-xl">`;
      document.getElementById('lightbox').classList.replace('hidden', 'flex');
    }

    function closeLightbox() { document.getElementById('lightbox').classList.replace('flex', 'hidden'); }

    window.onload = loadData;
  </script>
</body>
</html>
